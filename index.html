  push: (k, item) => { const arr = LS.get(k) || []; arr.push(item); LS.set(k, arr); return arr; },
  update: (k, id, patch) => {
    const arr = LS.get(k) || [];
    const updated = arr.map(x => x.id === id ? { ...x, ...patch } : x);

};

    nums[Math.floor(Math.random()*10)] +
    nums[Math.floor(Math.random()*10)] +
    nums[Math.floor(Math.random()*10)] +

const Avatar = ({ prenom, nom, size = 40, photo }) => {
  const initials = ((prenom?.[0] || '') + (nom?.[0] || '')).toUpperCase() || '?';
  const colors = ['#C9A84C','#1A6B3A','#1E40AF','#B91C1C','#6B21A8'];
  const color = colors[(prenom?.charCodeAt(0) || 0) % colors.length];
  if (photo) {
    return (
      <div className="avatar" style={{ width:size, height:size }}>
        <img src={photo} alt={`${prenom} ${nom}`} style={{width:'100%',height:'100%',objectFit:'cover'}} onError={e=>{e.target.style.display='none';}} />
      </div>
    );
  }
  return (
    <div className="avatar" style={{ width:size, height:size, background:color, fontSize:size*.35, color:'#fff' }}>
      {initials}
    </div>
  );
};

// ═══════════════════════════════════════════════════
// SCORE RING
// ═══════════════════════════════════════════════════
const ScoreRing = ({ score, size=80 }) => {
  const r = size/2 - 6;
  const circ = 2 * Math.PI * r;
  const dash = (score / 1000) * circ;
  return (
    <div className="score-ring" style={{width:size,height:size}}>
      <svg width={size} height={size}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#EDE9E2" strokeWidth="5" />
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#C9A84C" strokeWidth="5"
          strokeDasharray={`${dash} ${circ}`} strokeLinecap="round" transform={`rotate(-90 ${size/2} ${size/2})`} />
      </svg>
      <span className="score-val" style={{fontSize:size*.25}}>{score}</span>
    </div>
  );
};

const AuthPage = ({ onLogin }) => {

  const [role, setRole] = useState('apprenant');
  const [form, setForm] = useState({ prenom:'', nom:'', email:'', ville:'', password:'', code:'', entreprise:'', etablissement:'', domaine:'' });
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);
 
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
 
  const handleLogin = () => {
    setError('');
    if (!form.email || !form.password) { setError('Veuillez remplir tous les champs.'); return; }
    if (role === 'formateur' && !form.code) { setError('Le code formateur est requis.'); return; }
    if (role === 'formateur' && !VALID_CODES.includes(form.code)) { setError('Code formateur invalide.'); return; }
    setLoading(true);
    setTimeout(() => {
      const users = LS.get('sb_users') || [];
      const found = users.find(u => u.email === form.email && u.password === form.password && u.role === role);
      if (found) { onLogin(found); }
      else { setError('Email, mot de passe ou rôle incorrect.'); }
      setLoading(false);
    }, 600);
  };
 
  const handleRegister = () => {
    setError('');
    if (!form.prenom || !form.nom || !form.email || !form.password) { setError('Tous les champs obligatoires doivent être remplis.'); return; }
    if (form.password.length < 6) { setError('Le mot de passe doit comporter au moins 6 caractères.'); return; }
    if (role === 'formateur') {
      if (!form.code) { setError('Un code spécial est requis pour les formateurs.'); return; }
      if (!VALID_CODES.includes(form.code)) { setError('Code formateur invalide.'); return; }
    }
    setLoading(true);
    setTimeout(() => {
      const users = LS.get('sb_users') || [];
      if (users.find(u => u.email === form.email)) { setError('Cet email est déjà utilisé.'); setLoading(false); return; }

            ['100% souverain', 'Vos données vous appartiennent, hébergées de façon décentralisée'],

              {roles.map(r => (
                <div key={r.id} className={`role-opt${role===r.id?' selected':''}`} onClick={() => setRole(r.id)}>
                  <div className="role-opt-label">{r.label}</div>
                  <div style={{fontSize:9,color:'#6B6860',marginTop:1}}>{r.desc}</div>
                </div>
              ))}
            </div>
          </div>
 
          {error && <div className="alert alert-error">{error}</div>}
 
          {mode === 'register' && (
            <div className="grid-2" style={{gap:12,marginBottom:0}}>
              <div className="field"><label>Prénom *</label><input value={form.prenom} onChange={e=>set('prenom',e.target.value)} placeholder="Salimata" /></div>
              <div className="field"><label>Nom *</label><input value={form.nom} onChange={e=>set('nom',e.target.value)} placeholder="Ouédraogo" /></div>
            </div>
          )}
 
          <div className="field"><label>Email *</label><input type="email" value={form.email} onChange={e=>set('email',e.target.value)} placeholder="vous@exemple.bf" /></div>
          <div className="field"><label>Mot de passe *</label><input type="password" value={form.password} onChange={e=>set('password',e.target.value)} placeholder="••••••••" /></div>
 
          {mode === 'register' && (
            <>
              <div className="field"><label>Ville</label><input value={form.ville} onChange={e=>set('ville',e.target.value)} placeholder="Ouagadougou" /></div>
              {role === 'recruteur' && <div className="field"><label>Entreprise</label><input value={form.entreprise} onChange={e=>set('entreprise',e.target.value)} placeholder="Tech BF SARL" /></div>}
              {role === 'formateur' && <>
                <div className="field"><label>Établissement</label><input value={form.etablissement} onChange={e=>set('etablissement',e.target.value)} placeholder="École Numérique BF" /></div>
                <div className="field"><label>Domaine principal</label>
                  <select value={form.domaine} onChange={e=>set('domaine',e.target.value)}>
                    <option value="">Sélectionner...</option>
                    {DOMAINES.map(d => <option key={d}>{d}</option>)}
                  </select>
                </div>
              </>}
            </>
          )}
 
          {(role === 'formateur') && (
            <div className="field"><label>Code formateur *</label><input value={form.code} onChange={e=>set('code',e.target.value)} placeholder="FORM-2026-XX" /></div>
          )}
 
          <button className="btn btn-primary" style={{width:'100%',justifyContent:'center'}} onClick={mode==='login'?handleLogin:handleRegister} disabled={loading}>
            {loading ? 'Chargement...' : mode === 'login' ? 'Se connecter' : 'Créer mon compte'}
          </button>
 
          {mode === 'login' && (
            <div style={{marginTop:16,padding:12,background:'#F7F7F5',borderRadius:9,fontSize:12,color:'#6B6860'}}>
              <strong>Comptes démo :</strong><br/>
              Salimata (apprenant) : salimata@skillbadge.bf / pass123<br/>
              Sarah (recruteur) : sarah@tech.bf / pass123<br/>
              Marcus (formateur) : marcus@ecole.bf / pass123 + FORM-2026-X9
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

// BADGE CARD (clickable, expandable)
// ═══════════════════════════════════════════════════
const BadgeCard = ({ badge, showProject = false }) => {
  const [expanded, setExpanded] = useState(false);
  const projet = showProject && badge.projetId
    ? (LS.get('sb_projets') || []).find(p => p.id === badge.projetId)
    : null;
 
  return (
    <div className="badge-card fade-up" onClick={() => setExpanded(!expanded)} style={{userSelect:'none', ...(badge.type==='terrain' ? {borderColor:'#D97706', background:'linear-gradient(to bottom, #FFFBEB, #fff)'} : {})}}>
      {badge.type === 'terrain' && <div style={{position:'absolute',top:10,left:10,background:'#92400E',color:'#FEF3C7',fontSize:9,fontWeight:700,padding:'2px 6px',borderRadius:4,letterSpacing:'.04em'}}>🏭 TERRAIN</div>}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:4, ...(badge.type==='terrain' ? {marginTop:18} : {})}}>
        <div className="badge-title">{badge.titre}</div>
        <div style={{display:'flex',gap:6,alignItems:'center'}}>
          <span className={niveauPill(badge.niveau)}>{badge.niveau}</span>
          <span style={{fontSize:12,color:'#6B6860',transition:'.2s',transform:expanded?'rotate(180deg)':'none',display:'inline-block'}}>▾</span>
        </div>
      </div>
      <div className="badge-domain">{badge.domaine}</div>
      {badge.score && (
        <div style={{marginBottom:10}}>
          <div className="prog-bar">
            <div className="prog-fill" style={{width:`${badge.score}%`}} />
          </div>
          <div style={{fontSize:10,color:'#6B6860',marginTop:3}}>Score : {badge.score}/100</div>
        </div>
      )}
      <div className="badge-meta">
        <span>Token : <span className="badge-hash">{badge.tokenId}</span></span>
        <span>Hash : <span className="badge-hash">{badge.hash}</span></span>
        <div style={{display:'flex',justifyContent:'space-between',marginTop:4}}>
          <span className="badge-verified">✓ Vérifié on-chain</span>
          <span style={{color:'#6B6860'}}>{fmtDate(badge.date)}</span>
        </div>
      </div>
 
      {expanded && (
        <div className="badge-expand" onClick={e=>e.stopPropagation()}>
          {badge.type === 'terrain' && (
            <div style={{background:'linear-gradient(135deg,#92400E,#78350F)',color:'#FEF3C7',borderRadius:8,padding:'8px 12px',marginBottom:10,fontSize:12}}>
              🏭 <strong>Badge Terrain</strong> · Expérience certifiée en entreprise
              {badge.entreprise && <div style={{fontSize:11,marginTop:2,opacity:.8}}>Entreprise : {badge.entreprise}</div>}
              {badge.poste && <div style={{fontSize:11,marginTop:2,opacity:.8}}>Poste : {badge.poste}</div>}
              {badge.duree && <div style={{fontSize:11,marginTop:2,opacity:.8}}>Durée : {badge.duree}</div>}
            </div>
          )}
          {projet ? (
            <>
              <div style={{fontWeight:700,fontSize:12,marginBottom:8,color:'#6B6860',textTransform:'uppercase',letterSpacing:'.06em'}}>Projet associé</div>
              <div style={{fontWeight:700,fontSize:14,marginBottom:4}}>{projet.titre}</div>
              <div style={{fontSize:13,color:'#2A2A2A',lineHeight:1.6,marginBottom:6}}>{projet.resume}</div>
              {projet.notions && <div style={{fontFamily:'var(--mono)',fontSize:11,color:'#6B6860',marginBottom:6}}>{projet.notions}</div>}
              <a href={`https://${projet.lien}`} target="_blank" rel="noopener noreferrer"
                style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--blue)',textDecoration:'none'}} onClick={e=>e.stopPropagation()}>
                🔗 {projet.lien}
              </a>
            </>
          ) : (
            <div style={{fontSize:12,color:'#6B6860',fontStyle:'italic'}}>
              {badge.projetId ? 'Détails du projet non disponibles.' : badge.type === 'terrain' ? '' : 'Aucun projet associé à ce badge.'}
            </div>
          )}
          {badge.commentaire && (
            <div style={{marginTop:10,background:'var(--gold-light)',border:'1px solid var(--gold)',borderRadius:8,padding:'8px 12px'}}>
              <div style={{fontSize:10,fontWeight:700,color:'var(--gold-dark)',marginBottom:3}}>💬 Commentaire du formateur</div>
              <div style={{fontSize:12,color:'var(--ink2)'}}>{badge.commentaire}</div>
            </div>
          )}
          <div style={{marginTop:8,fontSize:11,color:'#6B6860'}}>
            {badge.type === 'terrain' ? `Certifié par ${badge.formateurNom || 'Recruteur'}` : `Émis par formateur`} · {fmtDate(badge.date)}
          </div>
        </div>
      )}
    </div>
  );
};

// PAGE PORTFOLIO (APPRENANT)
// ═══════════════════════════════════════════════════
const PagePortfolio = ({ user, showToast }) => {
  const [tab, setTab] = useState('badges');
  const [projForm, setProjForm] = useState({ titre:'', resume:'', notions:'', lien:'' });
  const [submitted, setSubmitted] = useState(false);
 
  const badges = (LS.get('sb_badges') || []).filter(b => b.apprenantId === user.id);
  const projets = (LS.get('sb_projets') || []).filter(p => p.apprenantId === user.id);
  const myNotifs = (LS.get('sb_notifs') || []).filter(n => n.toUserId === user.id && !n.read);
  const myOffers = (LS.get('sb_offers') || []).filter(o => o.apprenantId === user.id);
  const myComments = (LS.get('sb_comments') || []).filter(c => c.apprenantId === user.id);
 
  useEffect(() => {
    const all = LS.get('sb_notifs') || [];
    const updated = all.map(n => n.toUserId === user.id ? { ...n, read: true } : n);
    LS.set('sb_notifs', updated);
  }, [user.id]);
 
  const handleSubmitProjet = () => {
    if (!projForm.titre || !projForm.resume || !projForm.lien) { showToast('Veuillez remplir les champs obligatoires.'); return; }
    const newProj = {
      id: genId('PRJ'),
      apprenantId: user.id,
      apprenantNom: `${user.prenom} ${user.nom}`,
      ...projForm,
      statut: 'en_attente',
      badgeId: null,
      createdAt: dateNow(),
    };
    LS.push('sb_projets', newProj);
    const formateurs = (LS.get('sb_users') || []).filter(u => u.role === 'formateur');
    formateurs.forEach(f => {
      LS.push('sb_notifs', {
        id: genId('NTF'),
        toUserId: f.id,
        type: 'new_projet',
        msg: `Nouveau projet soumis par ${user.prenom} ${user.nom} : "${newProj.titre}"`,
        read: false,
        createdAt: dateNow(),
      });
    });
    setProjForm({ titre:'', resume:'', notions:'', lien:'' });
    setSubmitted(true);
    showToast('Projet soumis avec succès ! En attente de validation.');
    setTimeout(() => setSubmitted(false), 4000);
  };
 
  const setP = (k, v) => setProjForm(f => ({ ...f, [k]: v }));
  const score = badges.length * 150 + badges.filter(b=>b.niveau==='EXPERT').length * 100 + badges.filter(b=>b.niveau==='INTERMÉDIAIRE').length * 50;
 
  return (
    <div className="page fade-up">
      <div style={{display:'flex',gap:20,alignItems:'flex-start',marginBottom:28,flexWrap:'wrap'}}>
        <Avatar prenom={user.prenom} nom={user.nom} size={68} photo={user.photo} />
        <div style={{flex:1}}>
          <div style={{fontFamily:'var(--serif)',fontSize:28,fontWeight:900,lineHeight:1.1}}>{user.prenom} {user.nom}</div>
          {user.ville && <div style={{fontSize:13,color:'#6B6860',marginTop:2}}>{user.ville}</div>}
          <div style={{fontSize:11,fontFamily:'var(--mono)',color:'#6B6860',marginTop:4}}>{user.wallet || '—'}</div>
          <div style={{display:'flex',gap:8,marginTop:10,flexWrap:'wrap'}}>
            <div className="chain-badge"><div className="chain-dot"/><span className="chain-label">{badges.length} BADGES</span></div>
            {myNotifs.length > 0 && <div style={{background:'#FEF3C7',border:'1px solid #F59E0B',borderRadius:20,padding:'4px 10px',fontSize:11,fontWeight:700,color:'#92400E'}}>{myNotifs.length} nouvelle(s) notification(s)</div>}
          </div>
          {/* Show recruiter ID */}
          <div style={{marginTop:12}}>
            <div style={{fontSize:11,color:'#6B6860',marginBottom:4}}>Votre ID recruteur (partagez cet ID pour vérification) :</div>
            <div className="id-chip">🔑 {user.recruteurId || 'N/A'}</div>
          </div>
        </div>
        <ScoreRing score={score} size={76} />
      </div>
 
      {myNotifs.length > 0 && (
        <div className="alert alert-info" style={{marginBottom:20}}>
          {myNotifs.map(n => <div key={n.id}>{n.msg}</div>)}
        </div>
      )}
 
      {myOffers.length > 0 && (
        <div className="card card-p" style={{marginBottom:20}}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:12}}>Offres d'opportunités reçues ({myOffers.length})</div>
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {myOffers.map(o => (
              <div key={o.id} className="offer-card">
                <div className="offer-title">{o.titre}</div>
                <div className="offer-from">{o.recruteurNom} · {o.entreprise} · {fmtDate(o.createdAt)}</div>
                {o.message && <div style={{fontSize:12,marginTop:6,color:'#0D0D0D'}}>{o.message}</div>}
              </div>
            ))}
          </div>
        </div>
      )}
 
      {/* Comments from formateurs */}
      {myComments.length > 0 && (
        <div className="card card-p" style={{marginBottom:20}}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:12}}>💬 Commentaires de formateurs ({myComments.length})</div>
          {myComments.map(c => (
            <div key={c.id} className="comment">
              <div className="comment-author">{c.formateurNom}</div>
              <div className="comment-text">{c.texte}</div>
              <div className="comment-date">sur « {c.projetTitre} » · {fmtDate(c.createdAt)}</div>
            </div>
          ))}
        </div>
      )}
 
      <div className="grid-3" style={{marginBottom:24,gap:12}}>
        {[
          {num:badges.length, label:'Badges certifiés', trend:'+1 ce mois'},
          {num:projets.filter(p=>p.statut==='validé').length, label:'Projets validés', trend:''},
          {num:projets.filter(p=>p.statut==='en_attente').length, label:'En attente', trend:''},
        ].map((s,i) => (
          <div key={i} className="stat-card">
            <div className="stat-num">{s.num}</div>
            <div className="stat-label">{s.label}</div>
            {s.trend && <div className="stat-trend">{s.trend}</div>}
          </div>
        ))}
      </div>
 
      <div className="tabs">
        <button className={`tab${tab==='badges'?' active':''}`} onClick={()=>setTab('badges')}>Mes badges ({badges.length})</button>
        <button className={`tab${tab==='projets'?' active':''}`} onClick={()=>setTab('projets')}>Mes projets ({projets.length})</button>
        <button className={`tab${tab==='soumettre'?' active':''}`} onClick={()=>setTab('soumettre')}>Soumettre un projet</button>
      </div>
      {tab === 'badges' && (
        badges.length === 0
          ? <div className="empty"><div className="empty-icon">◈</div><div className="empty-text">Aucun badge encore. Cliquez sur un badge pour voir le projet associé.</div></div>
          : <div className="grid-auto">{badges.map(b => <BadgeCard key={b.id} badge={b} showProject={true} />)}</div>
      )}
 
      {tab === 'projets' && (
        projets.length === 0
          ? <div className="empty"><div className="empty-icon">◈</div><div className="empty-text">Aucun projet soumis.</div></div>
          : <div style={{display:'flex',flexDirection:'column',gap:12}}>
              {projets.map(p => {
                const projComments = (LS.get('sb_comments') || []).filter(c => c.projetId === p.id);
                return (
                  <div key={p.id} className="card card-p" style={{display:'flex',gap:14,alignItems:'flex-start',flexDirection:'column'}}>
                    <div style={{display:'flex',gap:14,alignItems:'flex-start',width:'100%'}}>
                      <div style={{flex:1}}>
                        <div style={{fontWeight:700,fontSize:14,marginBottom:3}}>{p.titre}</div>
                        <div style={{fontSize:12,color:'#6B6860',marginBottom:6}}>{p.resume}</div>
                        {p.notions && <div style={{fontSize:11,color:'#6B6860',fontFamily:'var(--mono)'}}>{p.notions}</div>}
                        <div style={{fontSize:11,color:'var(--blue)',marginTop:4}}>{p.lien}</div>
                        <div style={{fontSize:11,color:'#6B6860',marginTop:4}}>Soumis le {fmtDate(p.createdAt)}</div>
                        {p.rejetMsg && <div style={{fontSize:12,color:'var(--red)',marginTop:6,background:'var(--red-light)',padding:'6px 10px',borderRadius:6}}>Motif de refus : {p.rejetMsg}</div>}
                      </div>
                      <span className={`pill ${p.statut==='validé'?'pill-valid':p.statut==='rejeté'?'pill-reject':'pill-pending'}`}>
                        {p.statut === 'validé' ? 'Validé' : p.statut === 'rejeté' ? 'Refusé' : 'En attente'}
                      </span>
                    </div>
                    {projComments.length > 0 && (
                      <div style={{width:'100%'}}>
                        <div style={{fontSize:11,fontWeight:700,color:'#6B6860',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:6}}>Commentaires ({projComments.length})</div>
                        {projComments.map(c => (
                          <div key={c.id} className="comment">
                            <div className="comment-author">{c.formateurNom}</div>
                            <div className="comment-text">{c.texte}</div>
                            <div className="comment-date">{fmtDate(c.createdAt)}</div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
      )}
 
      {tab === 'soumettre' && (
        <div className="card card-p" style={{maxWidth:600}}>
          <div style={{fontWeight:700,fontSize:16,marginBottom:16}}>Soumettre un nouveau projet</div>
          {submitted && <div className="alert alert-success">Projet soumis ! Le formateur sera notifié.</div>}
          <div className="field"><label>Titre du projet *</label><input value={projForm.titre} onChange={e=>setP('titre',e.target.value)} placeholder="Ex: Application mobile de paiement" /></div>
          <div className="field"><label>Description *</label><textarea value={projForm.resume} onChange={e=>setP('resume',e.target.value)} placeholder="Décrivez votre projet..." /></div>
          <div className="field"><label>Technologies utilisées</label><input value={projForm.notions} onChange={e=>setP('notions',e.target.value)} placeholder="React, Node.js, MongoDB..." /></div>
          <div className="field"><label>Lien GitHub / Démo *</label><input value={projForm.lien} onChange={e=>setP('lien',e.target.value)} placeholder="github.com/vous/projet" /></div>
          <button className="btn btn-gold" onClick={handleSubmitProjet}>Soumettre le projet</button>
        </div>
      )}
    </div>
  );
};

          {num:badges.length, label:'Badges émis', trend:'Total'},

                <div key={d} style={{marginBottom:14}}>

                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:13,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.titre}</div>
                        <div style={{fontSize:11,color:'#6B6860',fontFamily:'var(--mono)'}}>{apprenant?.recruteurId || '—'} · {fmtDate(p.createdAt)}</div>
                      </div>
                    </div>
                  );
                })
            }
          </div>
        </div>
      </div>
    </div>
  );
};

// PAGE VALIDATION FORMATEUR (avec commentaires)
// ═══════════════════════════════════════════════════
const PageValidation = ({ user, showToast }) => {
  const [badgeForm, setBadgeForm] = useState({ titre:'', niveau:'DÉBUTANT', domaine:'', score:75, commentaire:'' });
  const [selectedProj, setSelectedProj] = useState(null);
  const [refresh, setRefresh] = useState(0);
  const [rejMsg, setRejMsg] = useState('');
  const [rejProj, setRejProj] = useState(null);
  const [commentProj, setCommentProj] = useState(null);
  const [commentText, setCommentText] = useState('');
  const [expandedProj, setExpandedProj] = useState(null);
 
  const projets = (LS.get('sb_projets') || []).filter(p => p.statut === 'en_attente');
  const users = LS.get('sb_users') || [];
  const setB = (k, v) => setBadgeForm(f => ({ ...f, [k]: v }));
 
  const handleValidate = (projetId) => {
    if (!badgeForm.titre || !badgeForm.domaine) { showToast('Remplissez le titre et le domaine du badge.'); return; }
    const proj = (LS.get('sb_projets') || []).find(p => p.id === projetId);
    if (!proj) return;
 
    const newBadge = {
      id: genId('BDG'),
      titre: badgeForm.titre,
      niveau: badgeForm.niveau,
      domaine: badgeForm.domaine,
      score: parseInt(badgeForm.score),
      commentaire: badgeForm.commentaire,
      apprenantId: proj.apprenantId,
      formateurId: user.id,
      formateurNom: `${user.prenom} ${user.nom}`,
      date: dateNow(),
      hash: genHash(),
      tokenId: 'SKB-' + Math.floor(10000+Math.random()*90000),
      projetId: proj.id,
    };
    LS.push('sb_badges', newBadge);
    LS.update('sb_projets', projetId, { statut: 'validé', badgeId: newBadge.id });
 
    const allUsers = LS.get('sb_users') || [];
    const apprenant = allUsers.find(u => u.id === proj.apprenantId);
    if (apprenant) {
      const bonus = badgeForm.niveau === 'EXPERT' ? 250 : badgeForm.niveau === 'INTERMÉDIAIRE' ? 150 : 80;
      LS.update('sb_users', proj.apprenantId, { score: (apprenant.score || 0) + bonus });
    }
 
    LS.push('sb_notifs', {
      id: genId('NTF'),
      toUserId: proj.apprenantId,
      type: 'badge_awarded',
      msg: `🎖️ Félicitations ! Le badge "${newBadge.titre}" (${newBadge.niveau}) a été attribué à votre projet "${proj.titre}".${badgeForm.commentaire ? ' Commentaire : ' + badgeForm.commentaire : ''}`,
      badgeId: newBadge.id,
      read: false,
      createdAt: dateNow(),
    });
 
    setBadgeForm({ titre:'', niveau:'DÉBUTANT', domaine:'', score:75, commentaire:'' });
    setSelectedProj(null);
    showToast(`Badge "${newBadge.titre}" émis sur la blockchain !`);
    setRefresh(r => r+1);
  };
 
  const handleReject = (projetId) => {
    LS.update('sb_projets', projetId, { statut: 'rejeté', rejetMsg: rejMsg });
    const proj = (LS.get('sb_projets') || []).find(p => p.id === projetId);
    if (proj) {
      LS.push('sb_notifs', {
        id: genId('NTF'),
        toUserId: proj.apprenantId,
        type: 'projet_rejected',
        msg: `Votre projet "${proj.titre}" a été refusé. ${rejMsg ? 'Raison : ' + rejMsg : ''}`,
        read: false,
        createdAt: dateNow(),
      });
    }
    setRejProj(null); setRejMsg('');
    showToast('Projet refusé, apprenant notifié.');
    setRefresh(r => r+1);
  };
 
  const handleComment = (proj) => {
    if (!commentText.trim()) { showToast('Le commentaire ne peut pas être vide.'); return; }
    const newComment = {
      id: genId('CMT'),
      projetId: proj.id,
      projetTitre: proj.titre,
      apprenantId: proj.apprenantId,
      formateurId: user.id,
      formateurNom: `${user.prenom} ${user.nom}`,
      texte: commentText.trim(),
      createdAt: dateNow(),
    };
    LS.push('sb_comments', newComment);
    LS.push('sb_notifs', {
      id: genId('NTF'),
      toUserId: proj.apprenantId,
      type: 'comment',
      msg: `${user.prenom} ${user.nom} a commenté votre projet "${proj.titre}"`,
      read: false,
      createdAt: dateNow(),
    });
    setCommentProj(null); setCommentText('');
    showToast('Commentaire envoyé à l\'apprenant !');
  };
 
  return (
    <div className="page fade-up">
      <div className="page-title">Projets à valider</div>
      <div className="page-sub">Évaluez les projets soumis, émettez des badges, et laissez des commentaires.</div>
 
      {projets.length === 0
        ? <div className="empty card card-p" style={{textAlign:'center',padding:48}}><div className="empty-icon">◈</div><div className="empty-text">Aucun projet en attente de validation.</div></div>
        : projets.map(p => {
            const apprenant = users.find(u => u.id === p.apprenantId);
            const isSelected = selectedProj === p.id;
            const isExpanded = expandedProj === p.id;
            const existingComments = (LS.get('sb_comments') || []).filter(c => c.projetId === p.id);
            return (
              <div key={p.id} className="card" style={{marginBottom:16}}>
                <div style={{padding:'20px 24px'}}>
                  <div style={{display:'flex',gap:14,alignItems:'flex-start',marginBottom:12}}>
                    <div style={{width:44,height:44,borderRadius:10,background:'var(--sand2)',border:'1.5px solid var(--sand3)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>📁</div>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,fontSize:16,marginBottom:4}}>{p.titre}</div>
                      <div style={{display:'inline-flex',alignItems:'center',gap:6,background:'var(--ink)',color:'var(--gold)',fontFamily:'var(--mono)',fontSize:12,fontWeight:700,padding:'4px 10px',borderRadius:7}}>
                        🔑 {apprenant?.recruteurId || '—'}
                      </div>
                      <div style={{fontSize:11,color:'#6B6860',marginTop:4}}>Soumis le {fmtDate(p.createdAt)}</div>
                    </div>
                    <span className="pill pill-pending">En attente</span>
                  </div>
 
                  {/* Bouton pour voir/cacher les détails */}
                  <button className="btn btn-outline btn-sm" style={{marginBottom: isExpanded ? 12 : 0, width:'100%', justifyContent:'center'}}
                    onClick={() => setExpandedProj(isExpanded ? null : p.id)}>
                    {isExpanded ? '▲ Masquer les détails' : '▼ Voir le projet complet'}
                  </button>
 
                  {/* Détails complets */}
                  {isExpanded && (
                    <div>
                      <div style={{fontSize:13,color:'#2A2A2A',lineHeight:1.6,marginBottom:10}}>{p.resume}</div>
                      {p.notions && <div style={{fontFamily:'var(--mono)',fontSize:11,color:'#6B6860',marginBottom:8,background:'var(--sand)',padding:'6px 10px',borderRadius:6}}>🔧 {p.notions}</div>}
                      <a href={`https://${p.lien}`} target="_blank" rel="noopener noreferrer"
                        style={{fontFamily:'var(--mono)',fontSize:12,color:'var(--blue)',textDecoration:'none',display:'inline-flex',alignItems:'center',gap:4,padding:'6px 10px',background:'var(--blue-light)',borderRadius:6,marginBottom:14}}>
                        🔗 {p.lien}
                      </a>
 
                      {existingComments.length > 0 && (
                        <div style={{marginBottom:14}}>
                          <div style={{fontSize:11,fontWeight:700,color:'#6B6860',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:6}}>Commentaires précédents ({existingComments.length})</div>
                          {existingComments.map(c => (
                            <div key={c.id} className="comment">
                              <div className="comment-author">{c.formateurNom}</div>
                              <div className="comment-text">{c.texte}</div>
                              <div className="comment-date">{fmtDate(c.createdAt)}</div>
                            </div>
                          ))}
                        </div>
                      )}
 
                      <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                        <button className="btn btn-gold btn-sm" onClick={() => { setSelectedProj(isSelected ? null : p.id); setRejProj(null); setCommentProj(null); }}>
                          {isSelected ? '✕ Fermer' : '🎖️ Attribuer un badge'}
                        </button>
                        <button className="btn btn-sm" style={{background:'var(--red)',color:'white'}} onClick={() => { setRejProj(rejProj===p.id?null:p.id); setSelectedProj(null); setCommentProj(null); }}>✕ Refuser</button>
                        <button className="btn btn-purple btn-sm" onClick={() => { setCommentProj(commentProj===p.id?null:p.id); setSelectedProj(null); setRejProj(null); }}>
                          💬 Commenter
                        </button>
                      </div>
                    </div>
                  )}
                </div>
 
                {/* Badge emission */}
                {isSelected && (
                  <div style={{padding:'20px 24px',borderTop:'1px solid var(--sand2)',background:'var(--sand)'}}>
                    <div style={{fontWeight:700,fontSize:14,marginBottom:14}}>🎖️ Définir le badge à émettre</div>
                    <div className="grid-2" style={{gap:12}}>
                      <div className="field"><label>Titre du badge *</label><input value={badgeForm.titre} onChange={e=>setB('titre',e.target.value)} placeholder="Ex: React.js Avancé" /></div>
                      <div className="field"><label>Domaine *</label>
                        <select value={badgeForm.domaine} onChange={e=>setB('domaine',e.target.value)}>
                          <option value="">Sélectionner...</option>
                          {DOMAINES.map(d => <option key={d}>{d}</option>)}
                        </select>
                      </div>
                      <div className="field"><label>Niveau</label>
                        <select value={badgeForm.niveau} onChange={e=>setB('niveau',e.target.value)}>
                          {NIVEAUX.map(n => <option key={n}>{n}</option>)}
                        </select>
                      </div>
                      <div className="field">
                        <label>Score ({badgeForm.score}/100)</label>
                        <input type="range" min={0} max={100} value={badgeForm.score} onChange={e=>setB('score',e.target.value)} style={{width:'100%',marginTop:8}} />
                      </div>
                    </div>
                    <div className="field">
                      <label>Commentaire pour l'apprenant (recommandé)</label>
                      <textarea value={badgeForm.commentaire} onChange={e=>setB('commentaire',e.target.value)} placeholder="Ex: Excellent travail ! Architecture solide et code bien documenté. Continuez dans cette voie..." rows={3} />
                    </div>
                    <button className="btn btn-primary" onClick={() => handleValidate(p.id)}>Émettre le badge sur la blockchain</button>
                  </div>
                )}
 
                {/* Comment panel */}
                {commentProj === p.id && (
                  <div style={{padding:'16px 24px',borderTop:'1px solid var(--sand2)',background:'var(--purple-light)'}}>
                    <div style={{fontWeight:600,fontSize:13,marginBottom:10,color:'var(--purple)'}}>💬 Laisser un commentaire sur ce projet</div>
                    <div className="field">
                      <textarea value={commentText} onChange={e=>setCommentText(e.target.value)} placeholder="Ex: Bonne architecture, mais améliorez la documentation..." rows={3} />
                    </div>
                    <div style={{display:'flex',gap:8}}>
                      <button className="btn btn-purple btn-sm" onClick={() => handleComment(p)}>Envoyer le commentaire</button>
                      <button className="btn btn-outline btn-sm" onClick={() => { setCommentProj(null); setCommentText(''); }}>Annuler</button>
                    </div>
                  </div>
                )}
 
                {/* Reject modal */}
                {rejProj === p.id && (
                  <div style={{padding:'16px 24px',borderTop:'1px solid var(--sand2)',background:'#FEF2F2'}}>
                    <div style={{fontWeight:600,fontSize:13,marginBottom:10,color:'var(--red)'}}>Motif du refus (optionnel)</div>
                    <div className="field"><textarea value={rejMsg} onChange={e=>setRejMsg(e.target.value)} placeholder="Ex: Le projet manque de documentation..." rows={2} /></div>
                    <div style={{display:'flex',gap:8}}>
                      <button className="btn btn-red btn-sm" onClick={() => handleReject(p.id)}>Confirmer le refus</button>
                      <button className="btn btn-outline btn-sm" onClick={() => setRejProj(null)}>Annuler</button>
                    </div>
                  </div>
                )}
              </div>
            );
          })
      }
    </div>
  );
};

// PAGE VÉRIFICATION RECRUTEUR (par ID uniquement)
// ═══════════════════════════════════════════════════
const PageVerification = ({ user }) => {
  const [query, setQuery] = useState('');
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(false);
  const [notFound, setNotFound] = useState(false);
 
  const handleSearch = () => {
    if (!query.trim()) return;
    setLoading(true); setResult(null); setNotFound(false);
    setTimeout(() => {
      const users = LS.get('sb_users') || [];
      // Recruteur searches ONLY by recruteurId
      const found = users.find(u =>
        u.role === 'apprenant' && u.recruteurId && u.recruteurId === query.trim()
      );
      if (found) {
        const badges = (LS.get('sb_badges') || []).filter(b => b.apprenantId === found.id);
        const projets = (LS.get('sb_projets') || []).filter(p => p.apprenantId === found.id && p.statut === 'validé');
        setResult({ user: found, badges, projets });
      } else {
        setNotFound(true);
      }
      setLoading(false);
    }, 1200);
  };
 
  return (
    <div className="page fade-up page-sm">
      <div className="page-title">Vérification de portfolio</div>
      <div className="page-sub">Entrez l'ID unique du candidat pour accéder à son portfolio certifié.</div>
 
      <div className="card card-p" style={{marginBottom:20}}>
        <div style={{marginBottom:12,padding:12,background:'var(--gold-light)',borderRadius:9,fontSize:12,color:'var(--gold-dark)',border:'1px solid var(--gold)'}}>
          🔑 <strong>Accès sécurisé par ID :</strong> Le candidat vous communique son ID personnel. Vous ne pouvez pas rechercher par nom ou email.
        </div>
        <div style={{display:'flex',gap:10}}>
          <div style={{flex:1}}>
            <input value={query} onChange={e=>setQuery(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleSearch()}
              placeholder="ID du candidat ex: X670&gm"
              style={{width:'100%',padding:'12px 16px',border:'1.5px solid var(--sand3)',borderRadius:9,fontSize:14,fontFamily:'var(--mono)',outline:'none'}}
              onFocus={e=>e.target.style.borderColor='var(--gold)'}
              onBlur={e=>e.target.style.borderColor='var(--sand3)'}
            />
          </div>
          <button className="btn btn-primary" onClick={handleSearch}>Vérifier</button>
        </div>
        <div style={{marginTop:10,fontSize:11,color:'#6B6860'}}>Essayez : <span style={{fontFamily:'var(--mono)',fontWeight:600}}>X670&gm</span> (ID de Salimata Ouédraogo)</div>
      </div>
 
      {loading && (
        <div style={{textAlign:'center',padding:48,color:'#6B6860'}}>
          <div style={{width:36,height:36,border:'3px solid var(--gold)',borderTopColor:'transparent',borderRadius:'50%',animation:'spin .8s linear infinite',margin:'0 auto 12px'}} />
          <div style={{fontFamily:'var(--mono)',fontSize:12,color:'var(--green)'}}>Interrogation Polygon...</div>
        </div>
      )}
 
      {notFound && <div className="alert alert-error">Aucun profil trouvé pour cet ID. Vérifiez l'ID communiqué par le candidat.</div>}
 
      {result && (
        <div className="fade-up">
          <div className="card card-p" style={{marginBottom:16}}>
            <div style={{display:'flex',gap:14,alignItems:'center',marginBottom:16}}>
              <Avatar prenom={result.user.prenom} nom={result.user.nom} size={56} photo={result.user.photo} />
              <div>
                <div style={{fontFamily:'var(--serif)',fontWeight:900,fontSize:22}}>{result.user.prenom} {result.user.nom}</div>
                <div style={{fontSize:12,color:'#6B6860'}}>{result.user.ville || 'Burkina Faso'}</div>
                <div style={{fontFamily:'var(--mono)',fontSize:11,color:'#6B6860'}}>{result.user.wallet || '—'}</div>
              </div>
              <div style={{marginLeft:'auto',textAlign:'right'}}>
                <div style={{fontFamily:'var(--serif)',fontWeight:900,fontSize:28}}>{result.badges.length}</div>
                <div style={{fontSize:11,color:'#6B6860'}}>badges certifiés</div>
              </div>
            </div>
            <div className="chain-badge">
              <div className="chain-dot"/><span className="chain-label">Vérifié on-chain · Polygon Mainnet</span>
            </div>
          </div>
 
          {result.projets.length > 0 && (
            <div className="card card-p" style={{marginBottom:16}}>
              <div style={{fontWeight:700,fontSize:14,marginBottom:12}}>Projets validés ({result.projets.length})</div>
              {result.projets.map(p => (
                <div key={p.id} style={{borderBottom:'1px solid var(--sand2)',paddingBottom:12,marginBottom:12}}>
                  <div style={{fontWeight:700,fontSize:13,marginBottom:3}}>{p.titre}</div>
                  <div style={{fontSize:12,color:'#2A2A2A',marginBottom:4}}>{p.resume}</div>
                  {p.notions && <div style={{fontFamily:'var(--mono)',fontSize:11,color:'#6B6860',marginBottom:4}}>{p.notions}</div>}
                  <a href={`https://${p.lien}`} target="_blank" rel="noopener noreferrer" style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--blue)',textDecoration:'none'}}>🔗 {p.lien}</a>
                </div>
              ))}
            </div>
          )}
 
          {result.badges.length === 0
            ? <div className="empty card card-p"><div className="empty-text">Aucun badge pour ce profil.</div></div>
            : <div className="grid-auto">{result.badges.map(b => <BadgeCard key={b.id} badge={b} showProject={true} />)}</div>
          }
        </div>
      )}
    </div>
  );
};

// PAGE EXPLORATEUR (avec stats + photos + noms burkinabè)
// ═══════════════════════════════════════════════════
const PageExplorateur = ({ currentUser, showToast }) => {
  const [search, setSearch] = useState('');
  const [filterDomain, setFilterDomain] = useState('');
  const [offerForm, setOfferForm] = useState({ titre:'', message:'' });
  const [showOffer, setShowOffer] = useState(null);
  const [offerSent, setOfferSent] = useState('');
 
  const users = (LS.get('sb_users') || []).filter(u => u.role === 'apprenant');
  const allBadges = LS.get('sb_badges') || [];
  const totalBadges = allBadges.length;
  const expertCount = allBadges.filter(b=>b.niveau==='EXPERT').length;
 
  const filtered = users.filter(u => {
    const name = `${u.prenom} ${u.nom}`.toLowerCase();
    const matchSearch = !search || name.includes(search.toLowerCase());
    const badges = allBadges.filter(b => b.apprenantId === u.id);
    const matchDomain = !filterDomain || badges.some(b => b.domaine === filterDomain);
    return matchSearch && matchDomain;
  });
 
  const sendOffer = (apprenant) => {
    if (!offerForm.titre) { showToast('Le titre de l\'offre est requis.'); return; }
    LS.push('sb_offers', {
      id: genId('OFR'),
      apprenantId: apprenant.id,
      recruteurId: currentUser.id,
      recruteurNom: `${currentUser.prenom} ${currentUser.nom}`,
      entreprise: currentUser.entreprise || '',
      titre: offerForm.titre,
      message: offerForm.message,
      createdAt: dateNow(),
    });
    LS.push('sb_notifs', {
      id: genId('NTF'),
      toUserId: apprenant.id,
      type: 'offer',
      msg: `Nouvelle offre de ${currentUser.prenom} ${currentUser.nom} (${currentUser.entreprise || 'Recruteur'}) : "${offerForm.titre}"`,
      read: false,
      createdAt: dateNow(),
    });
    setShowOffer(null);
    setOfferForm({ titre:'', message:'' });
    setOfferSent(apprenant.id);
    showToast(`Offre envoyée à ${apprenant.prenom} !`);
    setTimeout(() => setOfferSent(''), 3000);
  };
 
  return (
    <div className="page fade-up">
      <div className="page-title">Explorateur de talents</div>
 
      {/* Stats Banner */}
      <div className="stats-banner">
        <div style={{fontSize:12,color:'rgba(255,255,255,.5)',marginBottom:12,fontFamily:'var(--mono)',letterSpacing:'.06em'}}>RÉSEAU SKILLBADGE · BURKINA FASO</div>
        <div className="stats-banner-grid">
          <div className="stats-banner-item">
            <div className="stats-banner-num">7 024</div>
            <div className="stats-banner-label">Personnes certifiées</div>
          </div>
          <div className="stats-banner-item">
            <div className="stats-banner-num">12 847</div>
            <div className="stats-banner-label">Badges émis</div>
          </div>
          <div className="stats-banner-item">
            <div className="stats-banner-num">214</div>
            <div className="stats-banner-label">Entreprises partenaires</div>
          </div>
          <div className="stats-banner-item">
            <div className="stats-banner-num">98%</div>
            <div className="stats-banner-label">Vérifiés on-chain</div>
          </div>
        </div>
      </div>
 
      <div style={{display:'flex',gap:10,marginBottom:24,flexWrap:'wrap'}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Rechercher par nom..."
          style={{flex:1,minWidth:200,padding:'10px 14px',border:'1.5px solid var(--sand3)',borderRadius:9,fontSize:13,fontFamily:'var(--sans)',outline:'none'}}
          onFocus={e=>e.target.style.borderColor='var(--gold)'}
          onBlur={e=>e.target.style.borderColor='var(--sand3)'}
        />
        <select value={filterDomain} onChange={e=>setFilterDomain(e.target.value)}
          style={{padding:'10px 14px',border:'1.5px solid var(--sand3)',borderRadius:9,fontSize:13,fontFamily:'var(--sans)',outline:'none',background:'white'}}>
          <option value="">Tous les domaines</option>
          {DOMAINES.map(d => <option key={d}>{d}</option>)}
        </select>
      </div>
 
      {filtered.length === 0
        ? <div className="empty card card-p"><div className="empty-text">Aucun profil trouvé.</div></div>
        : <div className="grid-auto">
            {filtered.map(u => {
              const badges = allBadges.filter(b => b.apprenantId === u.id);
              const score = badges.length * 150 + badges.filter(b=>b.niveau==='EXPERT').length * 100;
              return (
                <div key={u.id} className="participant-card">
                  {/* Photo */}
                  <div style={{position:'relative'}}>
                    <img
                      src={u.photo}
                      alt={`${u.prenom} ${u.nom}`}
                      className="participant-photo"
                      onError={e => { e.target.style.display='none'; e.target.nextSibling.style.display='flex'; }}
                    />
                    <div className="participant-photo-placeholder" style={{display:'none',background:'var(--sand2)'}}>👤</div>
                    <div style={{position:'absolute',bottom:10,right:10}}>
                      <ScoreRing score={score} size={44} />
                    </div>
                  </div>
 
                  <div style={{padding:'14px 16px'}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:4}}>
                      <div>
                        <div style={{fontWeight:700,fontSize:15,fontFamily:'var(--serif)'}}>{u.prenom} {u.nom}</div>
                        <div style={{fontSize:11,color:'#6B6860'}}>{u.ville || 'Burkina Faso'}</div>
                      </div>
                    </div>
 
                    {/* ID (visible par tous dans l'explorateur, pour contact) */}
                    <div style={{margin:'8px 0'}}>
                      <span className="participant-id">{u.recruteurId || '—'}</span>
                    </div>
 
                    {badges.length > 0 && (
                      <div style={{display:'flex',gap:4,flexWrap:'wrap',marginBottom:10}}>
                        {badges.slice(0,3).map(b => <span key={b.id} className="pill" style={{background:'var(--sand2)',color:'var(--ink)',border:'1px solid var(--sand3)',fontSize:9}}>{b.titre}</span>)}
                        {badges.length > 3 && <span className="pill" style={{background:'var(--sand3)',color:'#6B6860',fontSize:9}}>+{badges.length-3}</span>}
                      </div>
                    )}
 
                    <div style={{fontSize:11,fontFamily:'var(--mono)',color:'#6B6860',marginBottom:12}}>{u.wallet || '—'}</div>
 
                    {currentUser.role === 'recruteur' && (
                      offerSent === u.id
                        ? <div className="alert alert-success" style={{marginBottom:0,fontSize:12}}>✓ Offre envoyée !</div>
                        : showOffer === u.id
                        ? (
                          <div style={{background:'var(--sand)',borderRadius:9,padding:12}}>
                            <div className="field" style={{marginBottom:8}}><label>Titre de l'offre *</label><input value={offerForm.titre} onChange={e=>setOfferForm(f=>({...f,titre:e.target.value}))} placeholder="Ex: Développeur React Senior" /></div>
                            <div className="field" style={{marginBottom:8}}><label>Message</label><textarea rows={2} value={offerForm.message} onChange={e=>setOfferForm(f=>({...f,message:e.target.value}))} placeholder="Décrivez l'opportunité..." /></div>
                            <div style={{display:'flex',gap:8}}>
                              <button className="btn btn-gold btn-sm" onClick={() => sendOffer(u)}>Envoyer</button>
                              <button className="btn btn-outline btn-sm" onClick={() => setShowOffer(null)}>Annuler</button>
                            </div>
                          </div>
                        )
                        : <button className="btn btn-outline btn-sm" style={{width:'100%',justifyContent:'center'}} onClick={() => setShowOffer(u.id)}>Envoyer une offre</button>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
      }
    </div>
  );
};

      </div>

  );
};

// PAGE NOTIFICATIONS (APPRENANT)
// ═══════════════════════════════════════════════════
const PageNotifications = ({ user }) => {
  const [notifs, setNotifs] = React.useState([]);
  const allBadges = LS.get('sb_badges') || [];
 
  React.useEffect(() => {
    const all = LS.get('sb_notifs') || [];
    const mine = all.filter(n => n.toUserId === user.id).sort((a,b) => b.createdAt?.localeCompare(a.createdAt || '') || 0);
    setNotifs(mine);
    // Mark all as read
    const updated = all.map(n => n.toUserId === user.id ? { ...n, read: true } : n);
    LS.set('sb_notifs', updated);
  }, [user.id]);
 
  const typeIcon = (type) => {
    if (type === 'badge_awarded') return '🎖️';
    if (type === 'projet_rejected') return '✕';
    if (type === 'comment') return '💬';
    if (type === 'offer') return '📩';
    return '🔔';
  };
  const typeBg = (type) => {
    if (type === 'badge_awarded') return { bg:'var(--gold-light)', border:'var(--gold)' };
    if (type === 'projet_rejected') return { bg:'var(--red-light)', border:'#FCA5A5' };
    if (type === 'comment') return { bg:'var(--purple-light)', border:'#D8B4FE' };
    if (type === 'offer') return { bg:'var(--green-light)', border:'#6EE7B7' };
    return { bg:'var(--blue-light)', border:'#93C5FD' };
  };
 
  return (
    <div className="page fade-up page-sm">
      <div className="page-title">Mes notifications</div>
      <div className="page-sub">Badges reçus, commentaires de formateurs et offres d'entreprises.</div>
 
      {notifs.length === 0
        ? <div className="empty card card-p"><div className="empty-icon">🔔</div><div className="empty-text">Aucune notification pour le moment.</div></div>
        : <div style={{display:'flex',flexDirection:'column',gap:12}}>
            {notifs.map(n => {
              const { bg, border } = typeBg(n.type);
              const badge = n.badgeId ? allBadges.find(b => b.id === n.badgeId) : null;
              return (
                <div key={n.id} style={{background:bg,border:`1px solid ${border}`,borderRadius:12,padding:'14px 18px'}}>
                  <div style={{display:'flex',gap:10,alignItems:'flex-start'}}>
                    <span style={{fontSize:20}}>{typeIcon(n.type)}</span>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,color:'var(--ink)',lineHeight:1.6}}>{n.msg}</div>
                      <div style={{fontSize:11,color:'#6B6860',marginTop:4}}>{fmtDate(n.createdAt)}</div>
                      {badge && (
                        <div style={{marginTop:8,display:'inline-flex',alignItems:'center',gap:8,background:'white',borderRadius:8,padding:'6px 10px',border:'1px solid var(--sand3)'}}>
                          <span className={niveauPill(badge.niveau)}>{badge.niveau}</span>
                          <span style={{fontWeight:700,fontSize:13}}>{badge.titre}</span>
                          <span style={{fontSize:11,color:'#6B6860'}}>{badge.domaine}</span>
                          {badge.score && <span style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--gold-dark)'}}>{badge.score}/100</span>}
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
      }
    </div>
  );
};

  const allProjets = LS.get('sb_projets') || [];
  const allBadges = LS.get('sb_badges') || [];
  const allComments = LS.get('sb_comments') || [];
 
  // Projets validés ou refusés par ce formateur (via badges émis ou rejet)

            {projetsNotes.map(p => {

                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,fontSize:15,marginBottom:4}}>{p.titre}</div>
                      <div style={{display:'inline-flex',alignItems:'center',gap:6,background:'var(--ink)',color:'var(--gold)',fontFamily:'var(--mono)',fontSize:12,fontWeight:700,padding:'3px 9px',borderRadius:6,marginBottom:6}}>
                        🔑 {apprenant?.recruteurId || '—'}
                      </div>
                      <div style={{fontSize:11,color:'#6B6860',marginBottom:6}}>Soumis le {fmtDate(p.createdAt)}</div>
                      <div style={{fontSize:12,color:'#2A2A2A',lineHeight:1.5}}>{p.resume}</div>
                      {p.notions && <div style={{fontFamily:'var(--mono)',fontSize:11,color:'#6B6860',marginTop:4}}>{p.notions}</div>}
                      <a href={`https://${p.lien}`} target="_blank" rel="noopener noreferrer"
                        style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--blue)',textDecoration:'none',display:'inline-block',marginTop:4}}>🔗 {p.lien}</a>
                    </div>
                    <span className={`pill ${p.statut==='validé'?'pill-valid':'pill-reject'}`}>
                      {p.statut === 'validé' ? '✓ Validé' : '✕ Refusé'}
                    </span>
                  </div>
 
                  {badge && (
                    <div style={{background:'var(--gold-light)',border:'1px solid var(--gold)',borderRadius:9,padding:'10px 14px',marginBottom:10,display:'flex',gap:12,alignItems:'center',flexWrap:'wrap'}}>
                      <span className={niveauPill(badge.niveau)}>{badge.niveau}</span>
                      <span style={{fontWeight:700,fontSize:13}}>{badge.titre}</span>
                      <span style={{fontSize:11,color:'#6B6860'}}>{badge.domaine}</span>
                      {badge.score && <span style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--gold-dark)',marginLeft:'auto'}}>{badge.score}/100</span>}
                      {badge.commentaire && <div style={{width:'100%',fontSize:12,color:'var(--ink2)',fontStyle:'italic',borderTop:'1px solid var(--gold)',paddingTop:6,marginTop:4}}>💬 "{badge.commentaire}"</div>}
                    </div>
                  )}
 
                  {p.rejetMsg && (
                    <div style={{background:'var(--red-light)',border:'1px solid #FCA5A5',borderRadius:9,padding:'8px 12px',marginBottom:10,fontSize:12,color:'var(--red)'}}>
                      Motif de refus : {p.rejetMsg}
                    </div>
                  )}
 
                  {comments.length > 0 && (
                    <div>
                      <div style={{fontSize:11,fontWeight:700,color:'#6B6860',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:6}}>Vos commentaires ({comments.length})</div>
                      {comments.map(c => (
                        <div key={c.id} className="comment">
                          <div className="comment-text">{c.texte}</div>
                          <div className="comment-date">{fmtDate(c.createdAt)}</div>
                        </div>

                    </div>
                  )}
                </div>
              );
            })}
          </div>
      }
    </div>
  );
};
 
// ═══════════════════════════════════════════════════
// PAGE BADGE TERRAIN (RECRUTEUR)
// ═══════════════════════════════════════════════════
const PageBadgeTerrain = ({ user, showToast }) => {
  const [query, setQuery] = useState('');
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(false);
  const [notFound, setNotFound] = useState(false);
  const [form, setForm] = useState({ poste:'', domaine:'', duree:'', description:'', commentaire:'' });
  const [emitted, setEmitted] = useState(false);
 
  const handleSearch = () => {
    if (!query.trim()) return;
    setLoading(true); setResult(null); setNotFound(false); setEmitted(false);
    setTimeout(() => {
      const users = LS.get('sb_users') || [];
      const found = users.find(u => u.role === 'apprenant' && u.recruteurId === query.trim());
      if (found) {
        const badges = (LS.get('sb_badges') || []).filter(b => b.apprenantId === found.id);
        setResult({ user: found, badges });
      } else {
        setNotFound(true);
      }
      setLoading(false);
    }, 800);
  };
 
  const setF = (k, v) => setForm(f => ({ ...f, [k]: v }));
 
  const handleEmitTerrain = () => {
    if (!form.poste || !form.domaine || !form.duree) { showToast('Veuillez remplir le poste, le domaine et la durée.'); return; }
    if (!result) return;
 
    const newBadge = {
      id: genId('BDG'),
      type: 'terrain',
      titre: `${form.poste} — Expérience Terrain`,
      niveau: 'EXPERT',
      domaine: form.domaine,
      score: 100,
      poste: form.poste,
      duree: form.duree,
      description: form.description,
      commentaire: form.commentaire,
      entreprise: user.entreprise || '',
      apprenantId: result.user.id,
      formateurId: user.id,
      formateurNom: `${user.prenom} ${user.nom} (${user.entreprise || 'Recruteur'})`,
      date: dateNow(),
      hash: genHash(),
      tokenId: 'SKB-T' + Math.floor(10000+Math.random()*90000),
      projetId: null,
    };
    LS.push('sb_badges', newBadge);
 
    // Update apprenant score
    const allUsers = LS.get('sb_users') || [];
    const apprenant = allUsers.find(u => u.id === result.user.id);
    if (apprenant) {
      LS.update('sb_users', result.user.id, { score: (apprenant.score || 0) + 300 });
    }
 
    LS.push('sb_notifs', {
      id: genId('NTF'),
      toUserId: result.user.id,
      type: 'badge_awarded',
      msg: `🏭 Badge Terrain EXPERT attribué par ${user.prenom} ${user.nom} (${user.entreprise || 'Recruteur'}) pour le poste "${form.poste}" — ${form.duree}.${form.commentaire ? ' Commentaire : ' + form.commentaire : ''}`,
      badgeId: newBadge.id,
      read: false,
      createdAt: dateNow(),
    });
 
    setEmitted(true);
    setForm({ poste:'', domaine:'', duree:'', description:'', commentaire:'' });
    showToast(`Badge Terrain émis pour ${result.user.prenom} !`);
  };
 
  return (
    <div className="page fade-up page-sm">
      <div className="page-title">Badge Terrain Expert</div>
      <div className="page-sub">Certifiez l'expérience terrain d'un apprenant ayant travaillé dans votre entreprise.</div>
 
      <div className="alert alert-warn" style={{marginBottom:20}}>
        🏭 <strong>Badge Terrain :</strong> Ce badge EXPERT est réservé aux recruteurs pour certifier une expérience professionnelle réelle. Il est immuable une fois émis.
      </div>
 
      <div className="card card-p" style={{marginBottom:20}}>
        <div style={{fontWeight:700,fontSize:14,marginBottom:12}}>1. Identifier l'apprenant par son ID</div>
        <div style={{display:'flex',gap:10,marginBottom:8}}>
          <input value={query} onChange={e=>setQuery(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleSearch()}
            placeholder="ID du candidat ex: X670&gm"
            style={{flex:1,padding:'11px 14px',border:'1.5px solid var(--sand3)',borderRadius:9,fontSize:13,fontFamily:'var(--mono)',outline:'none'}}
            onFocus={e=>e.target.style.borderColor='var(--gold)'}
            onBlur={e=>e.target.style.borderColor='var(--sand3)'}
          />
          <button className="btn btn-primary" onClick={handleSearch}>Rechercher</button>
        </div>
        <div style={{fontSize:11,color:'#6B6860'}}>Essayez : <span style={{fontFamily:'var(--mono)',fontWeight:600}}>X670&gm</span></div>
      </div>
 
      {loading && <div style={{textAlign:'center',padding:32,color:'#6B6860'}}><div style={{width:28,height:28,border:'3px solid var(--gold)',borderTopColor:'transparent',borderRadius:'50%',animation:'spin .8s linear infinite',margin:'0 auto 8px'}} /></div>}
      {notFound && <div className="alert alert-error">Aucun apprenant trouvé pour cet ID.</div>}
 
      {result && (
        <div className="fade-up">
          <div className="card card-p" style={{marginBottom:16,display:'flex',gap:14,alignItems:'center'}}>
            <Avatar prenom={result.user.prenom} nom={result.user.nom} size={52} photo={result.user.photo} />
            <div>
              <div style={{fontFamily:'var(--serif)',fontWeight:900,fontSize:20}}>{result.user.prenom} {result.user.nom}</div>
              <div style={{fontSize:12,color:'#6B6860'}}>{result.user.ville || 'Burkina Faso'}</div>
              <div style={{display:'flex',gap:6,marginTop:6,flexWrap:'wrap'}}>
                {result.badges.slice(0,3).map(b => <span key={b.id} className={niveauPill(b.niveau)} style={{fontSize:9}}>{b.titre}</span>)}
                {result.badges.length > 3 && <span style={{fontSize:10,color:'#6B6860'}}>+{result.badges.length-3} badges</span>}
              </div>
            </div>
            <div style={{marginLeft:'auto',textAlign:'center'}}>
              <div style={{fontFamily:'var(--serif)',fontWeight:900,fontSize:28,color:'var(--gold)'}}>{result.badges.length}</div>
              <div style={{fontSize:10,color:'#6B6860'}}>badges</div>
            </div>
          </div>
 
          {emitted
            ? <div className="alert alert-success">✓ Badge Terrain EXPERT émis avec succès ! L'apprenant a été notifié.</div>
            : (
              <div className="card card-p">
                <div style={{fontWeight:700,fontSize:14,marginBottom:14}}>2. Définir l'expérience terrain</div>
                <div className="grid-2" style={{gap:12}}>
                  <div className="field"><label>Poste occupé *</label><input value={form.poste} onChange={e=>setF('poste',e.target.value)} placeholder="Ex: Développeur React Senior" /></div>
                  <div className="field"><label>Domaine *</label>
                    <select value={form.domaine} onChange={e=>setF('domaine',e.target.value)}>
                      <option value="">Sélectionner...</option>
                      {DOMAINES.map(d => <option key={d}>{d}</option>)}
                    </select>
                  </div>
                  <div className="field"><label>Durée de la mission *</label><input value={form.duree} onChange={e=>setF('duree',e.target.value)} placeholder="Ex: 3 mois, 6 mois, 1 an..." /></div>
                  <div className="field"><label>Entreprise</label><input value={user.entreprise || ''} disabled style={{background:'var(--sand2)',color:'#6B6860'}} /></div>
                </div>
                <div className="field"><label>Description de l'expérience</label><textarea value={form.description} onChange={e=>setF('description',e.target.value)} placeholder="Décrivez les missions et responsabilités exercées..." rows={3} /></div>
                <div className="field"><label>Commentaire / Appréciation</label><textarea value={form.commentaire} onChange={e=>setF('commentaire',e.target.value)} placeholder="Ex: Candidat très compétent, autonome et rigoureux. A su s'intégrer rapidement dans notre équipe..." rows={3} /></div>
                <div style={{background:'#FEF3C7',border:'1px solid #F59E0B',borderRadius:8,padding:'10px 14px',fontSize:12,color:'#92400E',marginBottom:14}}>
                  ⚠️ Ce badge est définitif et immuable. Vérifiez bien les informations avant d'émettre.
                </div>
                <button className="btn btn-gold" onClick={handleEmitTerrain}>🏭 Émettre le Badge Terrain EXPERT</button>
              </div>
            )
          }
        </div>
      )}
    </div>
  );
};
 
// ═══════════════════════════════════════════════════
// APP ROOT
// ═══════════════════════════════════════════════════
function App() {
  const [user, setUser] = useState(null);
  const [page, setPage] = useState(null);
  const [toast, setToast] = useState('');
 
  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(''), 4000); };
 
  const handleLogin = (u) => {
    setUser(u);
    const defaults = { apprenant:'portfolio', recruteur:'verification', formateur:'dashboard' };
    setPage(defaults[u.role]);
  };
  const handleLogout = () => { setUser(null); setPage(null); };
 
  const notifCount = user?.role === 'formateur'
    ? (LS.get('sb_projets') || []).filter(p => p.statut === 'en_attente').length
    : user?.role === 'apprenant'
    ? (LS.get('sb_notifs') || []).filter(n => n.toUserId === user.id && !n.read).length
    : 0;
 
  if (!user) return <AuthPage onLogin={handleLogin} />;
 
  const renderPage = () => {
    if (page === 'portfolio')    return <PagePortfolio user={user} showToast={showToast} />;
    if (page === 'notifications') return <PageNotifications user={user} />;
    if (page === 'verification') return <PageVerification user={user} />;
    if (page === 'explorateur')  return <PageExplorateur currentUser={user} showToast={showToast} />;
    if (page === 'offres')       return <PageOffres user={user} />;
    if (page === 'badge_terrain') return <PageBadgeTerrain user={user} showToast={showToast} />;
    if (page === 'dashboard')    return <PageDashboard user={user} />;
    if (page === 'validation')   return <PageValidation user={user} showToast={showToast} />;
    if (page === 'historique')   return <PageHistorique user={user} />;
    if (page === 'projets_notes') return <PageProjetsNotes user={user} />;
    if (page === 'compte')       return <PageCompte user={user} onLogout={handleLogout} />;
    return null;
  };
 
  return (
    <div style={{minHeight:'100vh',background:'var(--sand)',fontFamily:'var(--sans)'}}>
      {toast && <Toast msg={toast} onClose={() => setToast('')} />}
      <Nav user={user} page={page} setPage={setPage} onLogout={handleLogout} notifCount={notifCount} />
      <main>{renderPage()}</main>
      <footer style={{textAlign:'center',padding:'24px 16px',fontSize:11,color:'#6B6860',borderTop:'1px solid var(--sand3)',background:'var(--white)',marginTop:48}}>
        © 2026 SkillBadge · Le Registre Souverain des Compétences · MIABE Hackathon · Burkina Faso
      </footer>
    </div>
  );
}
 
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
